<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BonziSEARCH - Loading</title>
<style>
    body { 
        font-family: 'Arial', 'Comic Sans MS', cursive; 
        text-align: center; 
        background: #ffffff; 
        margin: 0; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #spinner {
        width: 180px; 
        height: auto;
    }

    #loading-text { 
        margin-top: 15px; 
        font-size: 20px;
        color: #000;
    }
</style>
</head>
<body>

    <div class="loader-container">
        <img id="spinner" src="assets/spinner.webp" alt="Loading...">
    </div>

    <div id="loading-text">Fetching results for you...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q') || '';
        const media = params.get('media') === 'true';

        setTimeout(() => {
            if (!query) return;
            const target = media ? `/media?q=${encodeURIComponent(query)}` : `/search?q=${encodeURIComponent(query)}`;
            window.location.href = target;
        }, 2000); 
    </script>
</body>
</html>
